<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#5e5ce6"/>
  <!-- Kite body -->
  <polygon points="96,30 150,96 96,148 42,96" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Kite cross lines -->
  <line x1="96" y1="30" x2="96" y2="148" stroke="#5e5ce6" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="96" x2="150" y2="96" stroke="#5e5ce6" stroke-width="3" stroke-linecap="round"/>
  <!-- Kite tail -->
  <path d="M96,148 Q110,162 100,172 Q90,182 104,188" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
  <!-- Rupee symbol -->
  <text x="96" y="104" text-anchor="middle" font-family="-apple-system, Arial" font-size="36" font-weight="900" fill="#5e5ce6">₹</text>
</svg>
