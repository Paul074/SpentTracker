<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kite Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #191919;
            --card: #2d2d2d;
            --text: #ffffff;
            --subtext: #a0a0a0;
            --danger: #ff4d4f;
            --success: #4caf50;
            --accent: #007aff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
        }
        .container { padding: 20px; }
        h1, h2, h3 { margin: 0 0 10px 0; }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            box-sizing: border-box;
        }
        button {
            background: var(--text);
            color: var(--bg);
            font-weight: 600;
            cursor: pointer;
        }
        button.danger { background: var(--danger); color: white; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
        }
        .nav-item { color: var(--subtext); cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--text); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .progress-bar {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }
        .progress-fill.over { background: var(--danger); }
        .expense-item {
            border-bottom: 1px solid #333;
            padding: 10px 0;
        }
        .expense-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container tab-content active" id="home">
    <div class="flex-between" style="margin-bottom: 20px;">
        <h2>Kite Tracker</h2>
        <span id="currentMonthLabel" style="color: var(--subtext);"></span>
    </div>

    <div class="card">
        <h3>Month Overview</h3>
        <div class="flex-between">
            <span>Target:</span>
            <input type="number" id="monthlyTarget" placeholder="Set Target ₹" style="width: 100px; padding: 5px; margin:0;" onchange="updateTarget()">
        </div>
        <div class="flex-between" style="margin-top: 10px;">
            <span>Total Income:</span>
            <span id="displayIncome" style="color: var(--success);">₹0</span>
        </div>
        <div class="flex-between" style="margin-top: 10px;">
            <span>Spent:</span>
            <span id="displaySpent">₹0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="spentProgress"></div>
        </div>
        <p id="alertText" style="color: var(--danger); font-size: 12px; display: none; margin-top: 5px;">⚠️ Target crossed!</p>
    </div>

    <div class="card">
        <h3>Add Income</h3>
        <input type="number" id="incomeAmount" placeholder="Amount ₹">
        <input type="text" id="incomeNote" placeholder="Note (e.g., Salary, Freelance)">
        <button onclick="addIncome()">Record Income</button>
    </div>

    <div class="card">
        <h3>Add Expense</h3>
        <input type="number" id="expAmount" placeholder="Amount ₹">
        <input type="text" id="expTitle" placeholder="Title">
        <select id="expCategory"></select>
        <button onclick="addExpense()">Record Expense</button>
    </div>
    
    <div id="recentExpenses"></div>
</div>

<div class="container tab-content" id="settings">
    <h2>Settings</h2>
    <div class="card">
        <button onclick="exportData()">Export Database Backup (.json)</button>
        <button onclick="exportCSV()">Export to CSV</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">Home</div>
    <div class="nav-item" onclick="switchTab('settings', this)">Settings</div>
</div>

<script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // Default Categories
    let categories = ["🍔 Food", "🚌 Transport", "🛍️ Shopping", "💡 Bills", "💊 Health", "🎮 Fun", "📦 Other"];
    
    // Database Initialization
    let db = JSON.parse(localStorage.getItem('kite_db')) || { transactions: [], target: 0 };
    
    const getCurrentMonthId = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    };

    function init() {
        document.getElementById('currentMonthLabel').innerText = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
        document.getElementById('monthlyTarget').value = db.target || '';
        
        const catSelect = document.getElementById('expCategory');
        catSelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        
        calculateStats();
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    function updateTarget() {
        db.target = Number(document.getElementById('monthlyTarget').value);
        saveDb();
        calculateStats();
    }

    function addIncome() {
        const amount = Number(document.getElementById('incomeAmount').value);
        if (!amount) return;
        
        db.transactions.push({
            id: Date.now(),
            type: 'income',
            amount: amount,
            title: document.getElementById('incomeNote').value || 'Income',
            month: getCurrentMonthId(),
            timestamp: new Date().toISOString()
        });
        
        document.getElementById('incomeAmount').value = '';
        document.getElementById('incomeNote').value = '';
        saveDb();
        calculateStats();
    }

    function addExpense() {
        const amount = Number(document.getElementById('expAmount').value);
        const title = document.getElementById('expTitle').value;
        if (!amount || !title) return alert("Amount and Title required.");
        
        db.transactions.push({
            id: Date.now(),
            type: 'expense',
            amount: amount,
            title: title,
            category: document.getElementById('expCategory').value,
            month: getCurrentMonthId(),
            timestamp: new Date().toISOString()
        });
        
        document.getElementById('expAmount').value = '';
        document.getElementById('expTitle').value = '';
        saveDb();
        calculateStats();
    }

    function calculateStats() {
        const currentMonth = getCurrentMonthId();
        let totalIncome = 0;
        let totalSpent = 0;
        let recentHTML = '<h3>Recent Expenses</h3>';
        
        db.transactions.filter(t => t.month === currentMonth).forEach(t => {
            if (t.type === 'income') totalIncome += t.amount;
            if (t.type === 'expense') {
                totalSpent += t.amount;
                recentHTML += `
                    <div class="expense-item flex-between">
                        <div>
                            <div style="font-weight:600">${t.title}</div>
                            <div style="font-size:12px; color:var(--subtext)">${t.category}</div>
                        </div>
                        <div style="color:var(--danger)">-₹${t.amount}</div>
                    </div>`;
            }
        });

        document.getElementById('displayIncome').innerText = `₹${totalIncome}`;
        document.getElementById('displaySpent').innerText = `₹${totalSpent}`;
        document.getElementById('recentExpenses').innerHTML = recentHTML;

        // Progress Bar Logic
        const target = db.target || 1; 
        const percentage = Math.min((totalSpent / target) * 100, 100);
        const bar = document.getElementById('spentProgress');
        const alertTxt = document.getElementById('alertText');
        
        bar.style.width = `${percentage}%`;
        
        if (totalSpent > db.target && db.target > 0) {
            bar.classList.add('over');
            alertTxt.style.display = 'block';
        } else {
            bar.classList.remove('over');
            alertTxt.style.display = 'none';
        }
    }

    function saveDb() {
        localStorage.setItem('kite_db', JSON.stringify(db));
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `KiteBackup_${getCurrentMonthId()}.json`;
        a.click();
    }

    function exportCSV() {
        let csv = "Type,Date,Amount,Title,Category\n";
        db.transactions.forEach(t => {
            const date = new Date(t.timestamp).toLocaleDateString();
            csv += `${t.type},${date},${t.amount},${t.title},${t.category || ''}\n`;
        });
        const blob = new Blob([csv], { type: "text/csv" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `KiteExport_${getCurrentMonthId()}.csv`;
        a.click();
    }

    init();
</script>
</body>
</html>
